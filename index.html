<!doctype html>
<html lang="es" translate="no" class="notranslate">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <meta name="google" content="notranslate">
  <title>Lanzo POS</title>

  <link rel="icon" type="image/svg+xml" href="/logIcon.svg">

  <meta name="theme-color" content="#FFFFFF" />
  <meta name="color-scheme" content="light dark" />

  <script>
    (function () {

      var lightThemeColor = '#FFFFFF';
      var darkThemeColor = '#171B22';

      function updateThemeColor(theme) {
        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.setAttribute('content', theme === 'dark' ? darkThemeColor : lightThemeColor);
        }
      }
      
      // Función para aplicar el tema en el <html>
      function applyTheme(theme) {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
        updateThemeColor(theme);
      }

      // 1. Obtener la preferencia guardada por el usuario
      var savedTheme = localStorage.getItem('theme-preference');

      if (savedTheme && savedTheme !== 'system') {
        // Si el usuario eligió "claro" u "oscuro", aplicarlo
        applyTheme(savedTheme);
      } else {
        // Si no hay nada o eligió "system", usar la preferencia del OS
        var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (systemPrefersDark) {
          applyTheme('dark');
        } else {
          applyTheme('light');
        }
      }

      var observer = new MutationObserver(function () {
        updateThemeColor(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
      });

      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['data-theme']
      });
    })();
  </script>

</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
