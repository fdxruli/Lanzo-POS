<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanzo POS</title>

  <link rel="manifest" href="/manifest.webmanifest">

  <meta name="theme-color" content="#FF3B5C" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="apple-touch-icon" href="/pwa-192x192.png">

  <meta name="mobile-web-app-capable" content="yes" />

  <script>
    (function () {
      // Función para aplicar el tema en el <html>
      function applyTheme(theme) {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
      }

      // 1. Obtener la preferencia guardada por el usuario
      var savedTheme = localStorage.getItem('theme-preference');

      if (savedTheme && savedTheme !== 'system') {
        // Si el usuario eligió "claro" u "oscuro", aplicarlo
        applyTheme(savedTheme);
      } else {
        // Si no hay nada o eligió "system", usar la preferencia del OS
        var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (systemPrefersDark) {
          applyTheme('dark');
        } else {
          applyTheme('light');
        }
      }
    })();
  </script>

  <script>
    // Captura estricta y temprana para PWA
    window.deferredPwaPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPwaPrompt = e;
      // Emitimos una señal para que React se entere si ya se montó o cuando se monte
      window.dispatchEvent(new Event('lanzo-pwa-ready'));
    });

    window.addEventListener('appinstalled', () => {
      window.deferredPwaPrompt = null;
    });
  </script>
</head>

</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
