name: ECOM Orders Apply

on:
  push:
    branches:
      - fase-ecom-orders-1

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, 'apply generated integration') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fase-ecom-orders-1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply integration transforms
        run: node scripts/apply-ecom-orders-1.mjs
      - name: Remove one-shot helpers
        run: rm -f scripts/apply-ecom-orders-1.mjs .github/workflows/ecom-orders-apply.yml
      - name: Commit generated integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(ecommerce): apply generated integration"
          git push origin HEAD:fase-ecom-orders-1
