            versions.log
            npm-ci.log
            vitest-files.log
            vitest-suite.log
            vitest-results.json
            vitest-failure-manifest.json
            vitest-sequential.log
          if-no-files-found: warn
          retention-days: 7

  classify:
    name: Classify base/PR comparison
    needs: [test-main, test-pr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: vitest-base-${{ github.event.pull_request.base.sha }}
          path: artifacts/base

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: vitest-pr-${{ github.event.pull_request.head.sha }}
          path: artifacts/pr

      - name: Classify evidence
        shell: bash
        env:
          MAIN_NPM_CI: ${{ needs.test-main.outputs.npm_ci_exit }}
          PR_NPM_CI: ${{ needs.test-pr.outputs.npm_ci_exit }}
          MAIN_LIST: ${{ needs.test-main.outputs.list_exit }}
          PR_LIST: ${{ needs.test-pr.outputs.list_exit }}
          MAIN_SUITE: ${{ needs.test-main.outputs.suite_exit }}
          PR_SUITE: ${{ needs.test-pr.outputs.suite_exit }}
          MAIN_MANIFEST: ${{ needs.test-main.outputs.manifest_exit }}
          PR_MANIFEST: ${{ needs.test-pr.outputs.manifest_exit }}
          MAIN_SEQUENTIAL: ${{ needs.test-main.outputs.sequential_exit }}
          PR_SEQUENTIAL: ${{ needs.test-pr.outputs.sequential_exit }}
        run: |
          set +e
          classification=COMPARISON_INCONCLUSIVE
          status=1
          comparison_file=comparison.json
          if [ "$MAIN_NPM_CI" = 0 ] && [ "$PR_NPM_CI" = 0 ] && [ "$MAIN_LIST" = 0 ] && [ "$PR_LIST" = 0 ] && [ "$MAIN_MANIFEST" = 0 ] && [ "$PR_MANIFEST" = 0 ] && [ "$PR_SUITE" = 0 ] && [ "$MAIN_SUITE" = 0 ]; then
            classification=GLOBAL_SUITE_PASS; status=0
          elif [ "$MAIN_NPM_CI" = 0 ] && [ "$PR_NPM_CI" = 0 ] && [ "$MAIN_LIST" = 0 ] && [ "$PR_LIST" = 0 ] && [ "$MAIN_MANIFEST" = 0 ] && [ "$PR_MANIFEST" = 0 ] && [ "$PR_SUITE" = 0 ]; then
            classification=PR_SUITE_PASS; status=0
          elif [ "$MAIN_NPM_CI" = 0 ] && [ "$PR_NPM_CI" = 0 ] && [ "$MAIN_LIST" = 0 ] && [ "$PR_LIST" = 0 ] && [ "$MAIN_SUITE" = 124 ] && [ "$PR_SUITE" = 124 ]; then
            classification=INHERITED_TEST_RUNNER_LIMITATION; status=0
          elif [ "$MAIN_NPM_CI" = 0 ] && [ "$PR_NPM_CI" = 0 ] && [ "$MAIN_LIST" = 0 ] && [ "$PR_LIST" = 0 ] && { [ "$MAIN_SUITE" = 0 ] || [ "$MAIN_SUITE" = 1 ]; } && [ "$PR_SUITE" = 1 ] && [ "$MAIN_MANIFEST" = 0 ] && [ "$PR_MANIFEST" = 0 ]; then
            node scripts/ci/compare-vitest-baseline.mjs \
              artifacts/base/vitest-failure-manifest.json \
              artifacts/pr/vitest-failure-manifest.json > "$comparison_file"
            comparison_exit=$?
            if [ "$comparison_exit" = 0 ]; then
              classification=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('$comparison_file', 'utf8')).classification)")
              if [ "$classification" = PR_REGRESSION_CONFIRMED ]; then
                status=1
              elif [ "$classification" = INHERITED_GLOBAL_FAILURES_IDENTICAL ] || [ "$classification" = PR_SUITE_IMPROVED ]; then
                status=0
              fi
            fi
          fi
          {
            echo "## ${classification}"
            echo "- Base SHA: \`${{ github.event.pull_request.base.sha }}\`"
            echo "- PR SHA: \`${{ github.event.pull_request.head.sha }}\`"
            echo "- npm ci: base=${MAIN_NPM_CI}, pr=${PR_NPM_CI}"
            echo "- collection: base=${MAIN_LIST}, pr=${PR_LIST}"
            echo "- suite: base=${MAIN_SUITE}, pr=${PR_SUITE}"
            echo "- manifest: base=${MAIN_MANIFEST}, pr=${PR_MANIFEST}"
            echo "- sequential: base=${MAIN_SEQUENTIAL}, pr=${PR_SEQUENTIAL}"
            if [ -f "$comparison_file" ]; then
              echo "- Comparison:"
              node -e "const result=JSON.parse(require('node:fs').readFileSync('$comparison_file', 'utf8')); console.log('- base suites/tests: ' + result.baseSummary.totalSuites + '/' + result.baseSummary.totalTests); console.log('- base failed suites/tests: ' + result.baseSummary.failedSuites + '/' + result.baseSummary.failedTests); console.log('- PR suites/tests: ' + result.prSummary.totalSuites + '/' + result.prSummary.totalTests); console.log('- PR failed suites/tests: ' + result.prSummary.failedSuites + '/' + result.prSummary.failedTests); console.log('- shared failures: ' + result.sharedFailures.length); console.log('- new PR failures: ' + result.newFailures.length); console.log('- resolved failures: ' + result.resolvedFailures.length); for (const failure of result.newFailures) console.log('  - ' + failure)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "CLASSIFICATION=${classification}"
          exit "$status"
