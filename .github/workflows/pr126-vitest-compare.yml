name: PR #126 Vitest base/PR comparison

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CI: "true"

jobs:
  test-main:
    name: Test base SHA
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      npm_ci_exit: ${{ steps.install.outputs.npm_ci_exit || 'not_run' }}
      list_exit: ${{ steps.collect.outputs.list_exit || 'not_run' }}
      suite_exit: ${{ steps.suite.outputs.suite_exit || 'not_run' }}
      manifest_exit: ${{ steps.manifest.outputs.manifest_exit || 'not_run' }}
      sequential_exit: ${{ steps.sequential.outputs.sequential_exit || 'not_run' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - id: install
        name: Install reproducibly
        shell: bash
        run: |
          set +e
          node --version | tee versions.log
          npm --version | tee -a versions.log
          start=$(date +%s)
          npm ci --no-audit --no-fund 2>&1 | tee npm-ci.log
          npm_ci_exit=${PIPESTATUS[0]}
          echo "NPM_CI_SECONDS=$(( $(date +%s) - start ))" | tee -a versions.log
          echo "NPM_CI_EXIT_CODE=${npm_ci_exit}" | tee -a versions.log
          if [ "${npm_ci_exit}" = 0 ]; then npx vitest --version | tee -a versions.log; fi
          echo "npm_ci_exit=${npm_ci_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - id: collect
        name: Collect Vitest files
        if: steps.install.outputs.npm_ci_exit == '0'
        shell: bash
        run: |
          set +e
          set -o pipefail
          npx vitest list --filesOnly 2>&1 | tee vitest-files.log
          list_exit=${PIPESTATUS[0]}
          echo "VITEST_FILES_COUNT=$(grep -Ec '^src/.+\.(test|spec)\.(js|jsx)$' vitest-files.log || true)" | tee -a vitest-files.log
          tail -n 20 vitest-files.log
          echo "list_exit=${list_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - id: suite
        name: Run global suite with timeout
        if: steps.install.outputs.npm_ci_exit == '0' && steps.collect.outputs.list_exit == '0'
        shell: bash
        run: |
          set +e
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 25m npx vitest run \
            --maxWorkers=4 --reporter=default --reporter=json \
            --outputFile.json=vitest-results.json 2>&1 | tee vitest-suite.log
          suite_exit=${PIPESTATUS[0]}
          echo "SUITE_EXIT_CODE=${suite_exit}" | tee -a vitest-suite.log
          echo "suite_exit=${suite_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - id: manifest
        name: Create normalized failure manifest
        if: steps.suite.outputs.suite_exit != ''
        shell: bash
        run: |
          set +e
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const reportPath = path.resolve('vitest-results.json');
          if (!fs.existsSync(reportPath)) throw new Error('vitest-results.json was not generated');
          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          if (!Array.isArray(report.testResults)) throw new Error('Vitest JSON report does not contain testResults');
          const integer = (value, name) => {
            if (!Number.isInteger(value) || value < 0) throw new Error(`Vitest JSON report has invalid ${name}`);
            return value;
          };
          const normalizeFile = (file) => {
            const normalized = String(file || '').replace(/\\/g, '/');
            const workspace = process.cwd().replace(/\\/g, '/');
            if (normalized.startsWith(`${workspace}/`)) return normalized.slice(workspace.length + 1);
            const sourceIndex = normalized.indexOf('/src/');
            return sourceIndex >= 0 ? normalized.slice(sourceIndex + 1) : normalized.replace(/^\/+/, '');
          };
          const failures = [];
          const failedSuites = [];
          for (const result of report.testResults) {
            const file = normalizeFile(result.name || result.file);
            const assertions = Array.isArray(result.assertionResults) ? result.assertionResults : [];
            const suiteFailed = result.status === 'failed' || assertions.some((assertion) => assertion.status === 'failed');
            if (suiteFailed) failedSuites.push(file);
            for (const assertion of assertions) {
              if (assertion.status !== 'failed') continue;
              const fullName = assertion.fullName || [...(assertion.ancestorTitles || []), assertion.title]
                .filter(Boolean)
                .join(' > ');
              if (!file || !fullName) throw new Error('Failed assertion is missing a stable identity');
              failures.push(`${file}::${fullName}`);
            }
          }
          const summary = {
            totalSuites: integer(report.numTotalTestSuites, 'numTotalTestSuites'),
            failedSuites: integer(report.numFailedTestSuites, 'numFailedTestSuites'),
            totalTests: integer(report.numTotalTests, 'numTotalTests'),
            failedTests: integer(report.numFailedTests, 'numFailedTests'),
          };
          const sortedUnique = (values) => [...new Set(values)].sort((left, right) => left.localeCompare(right));
          const manifest = {
            summary,
            failedSuites: sortedUnique(failedSuites),
            failedTests: sortedUnique(failures),
          };
          if (manifest.failedTests.length !== summary.failedTests) {
            throw new Error(`Manifest failedTests (${manifest.failedTests.length}) does not match Vitest summary (${summary.failedTests})`);
          }
          if (manifest.failedSuites.length !== summary.failedSuites) {
            throw new Error(`Manifest failedSuites (${manifest.failedSuites.length}) does not match Vitest summary (${summary.failedSuites})`);
          }
          fs.writeFileSync('vitest-failure-manifest.json', `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
          manifest_exit=$?
          echo "MANIFEST_EXIT_CODE=${manifest_exit}" | tee -a vitest-suite.log
          echo "manifest_exit=${manifest_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - id: sequential
        name: Diagnose timeout or missing manifest
        if: steps.suite.outputs.suite_exit == '124' || (steps.suite.outputs.suite_exit != '' && steps.manifest.outputs.manifest_exit != '0')
        shell: bash
        run: |
          set +e
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 15m npx vitest run \
            --no-file-parallelism --maxWorkers=1 --reporter=verbose \
            --reporter=hanging-process --logHeapUsage 2>&1 | tee vitest-sequential.log
          sequential_exit=${PIPESTATUS[0]}
          echo "SEQUENTIAL_EXIT_CODE=${sequential_exit}" | tee -a vitest-sequential.log
          echo "sequential_exit=${sequential_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Base-suite diagnostic"
            echo "- Reference: \`${{ github.event.pull_request.base.sha }}\`"
            echo "- Node/npm/Vitest:"; cat versions.log 2>/dev/null || true
            echo "- npm ci exit: \`${{ steps.install.outputs.npm_ci_exit || 'not_run' }}\`"
            echo "- File collection exit: \`${{ steps.collect.outputs.list_exit || 'not_run' }}\`"
            echo "- Suite exit: \`${{ steps.suite.outputs.suite_exit || 'not_run' }}\`"
            echo "- Manifest exit: \`${{ steps.manifest.outputs.manifest_exit || 'not_run' }}\`"
            echo "- Sequential exit: \`${{ steps.sequential.outputs.sequential_exit || 'not_run' }}\`"
            echo "- Last recorded lines:"; tail -n 10 vitest-suite.log vitest-sequential.log 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-base-${{ github.event.pull_request.base.sha }}
          path: |
            versions.log
            npm-ci.log
            vitest-files.log
            vitest-suite.log
            vitest-results.json
            vitest-failure-manifest.json
            vitest-sequential.log
          if-no-files-found: warn
          retention-days: 7

  test-pr:
    name: Test PR SHA
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      npm_ci_exit: ${{ steps.install.outputs.npm_ci_exit || 'not_run' }}
      list_exit: ${{ steps.collect.outputs.list_exit || 'not_run' }}
      suite_exit: ${{ steps.suite.outputs.suite_exit || 'not_run' }}
      manifest_exit: ${{ steps.manifest.outputs.manifest_exit || 'not_run' }}
      sequential_exit: ${{ steps.sequential.outputs.sequential_exit || 'not_run' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - id: install
        name: Install reproducibly
        shell: bash
        run: |
          set +e
          node --version | tee versions.log
          npm --version | tee -a versions.log
          start=$(date +%s)
          npm ci --no-audit --no-fund 2>&1 | tee npm-ci.log
          npm_ci_exit=${PIPESTATUS[0]}
          echo "NPM_CI_SECONDS=$(( $(date +%s) - start ))" | tee -a versions.log
          echo "NPM_CI_EXIT_CODE=${npm_ci_exit}" | tee -a versions.log
          if [ "${npm_ci_exit}" = 0 ]; then npx vitest --version | tee -a versions.log; fi
          echo "npm_ci_exit=${npm_ci_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - id: collect
        name: Collect Vitest files
        if: steps.install.outputs.npm_ci_exit == '0'
        shell: bash
        run: |
          set +e
          set -o pipefail
          npx vitest list --filesOnly 2>&1 | tee vitest-files.log
          list_exit=${PIPESTATUS[0]}
          echo "VITEST_FILES_COUNT=$(grep -Ec '^src/.+\.(test|spec)\.(js|jsx)$' vitest-files.log || true)" | tee -a vitest-files.log
          tail -n 20 vitest-files.log
          echo "list_exit=${list_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - id: suite
        name: Run global suite with timeout
        if: steps.install.outputs.npm_ci_exit == '0' && steps.collect.outputs.list_exit == '0'
        shell: bash
        run: |
          set +e
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 25m npx vitest run \
            --maxWorkers=4 --reporter=default --reporter=json \
            --outputFile.json=vitest-results.json 2>&1 | tee vitest-suite.log
          suite_exit=${PIPESTATUS[0]}
          echo "SUITE_EXIT_CODE=${suite_exit}" | tee -a vitest-suite.log
          echo "suite_exit=${suite_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - id: manifest
        name: Create normalized failure manifest
        if: steps.suite.outputs.suite_exit != ''
        shell: bash
        run: |
          set +e
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const reportPath = path.resolve('vitest-results.json');
          if (!fs.existsSync(reportPath)) throw new Error('vitest-results.json was not generated');
          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          if (!Array.isArray(report.testResults)) throw new Error('Vitest JSON report does not contain testResults');
          const integer = (value, name) => {
            if (!Number.isInteger(value) || value < 0) throw new Error(`Vitest JSON report has invalid ${name}`);
            return value;
          };
          const normalizeFile = (file) => {
            const normalized = String(file || '').replace(/\\/g, '/');
            const workspace = process.cwd().replace(/\\/g, '/');
            if (normalized.startsWith(`${workspace}/`)) return normalized.slice(workspace.length + 1);
            const sourceIndex = normalized.indexOf('/src/');
            return sourceIndex >= 0 ? normalized.slice(sourceIndex + 1) : normalized.replace(/^\/+/, '');
          };
          const failures = [];
          const failedSuites = [];
          for (const result of report.testResults) {
            const file = normalizeFile(result.name || result.file);
            const assertions = Array.isArray(result.assertionResults) ? result.assertionResults : [];
            const suiteFailed = result.status === 'failed' || assertions.some((assertion) => assertion.status === 'failed');
            if (suiteFailed) failedSuites.push(file);
            for (const assertion of assertions) {
              if (assertion.status !== 'failed') continue;
              const fullName = assertion.fullName || [...(assertion.ancestorTitles || []), assertion.title]
                .filter(Boolean)
                .join(' > ');
              if (!file || !fullName) throw new Error('Failed assertion is missing a stable identity');
              failures.push(`${file}::${fullName}`);
            }
          }
          const summary = {
            totalSuites: integer(report.numTotalTestSuites, 'numTotalTestSuites'),
            failedSuites: integer(report.numFailedTestSuites, 'numFailedTestSuites'),
            totalTests: integer(report.numTotalTests, 'numTotalTests'),
            failedTests: integer(report.numFailedTests, 'numFailedTests'),
          };
          const sortedUnique = (values) => [...new Set(values)].sort((left, right) => left.localeCompare(right));
          const manifest = {
            summary,
            failedSuites: sortedUnique(failedSuites),
            failedTests: sortedUnique(failures),
          };
          if (manifest.failedTests.length !== summary.failedTests) {
            throw new Error(`Manifest failedTests (${manifest.failedTests.length}) does not match Vitest summary (${summary.failedTests})`);
          }
          if (manifest.failedSuites.length !== summary.failedSuites) {
            throw new Error(`Manifest failedSuites (${manifest.failedSuites.length}) does not match Vitest summary (${summary.failedSuites})`);
          }
          fs.writeFileSync('vitest-failure-manifest.json', `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
          manifest_exit=$?
          echo "MANIFEST_EXIT_CODE=${manifest_exit}" | tee -a vitest-suite.log
          echo "manifest_exit=${manifest_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - id: sequential
        name: Diagnose timeout or missing manifest
        if: steps.suite.outputs.suite_exit == '124' || (steps.suite.outputs.suite_exit != '' && steps.manifest.outputs.manifest_exit != '0')
        shell: bash
        run: |
          set +e
          set -o pipefail
          timeout --signal=TERM --kill-after=30s 15m npx vitest run \
            --no-file-parallelism --maxWorkers=1 --reporter=verbose \
            --reporter=hanging-process --logHeapUsage 2>&1 | tee vitest-sequential.log
          sequential_exit=${PIPESTATUS[0]}
          echo "SEQUENTIAL_EXIT_CODE=${sequential_exit}" | tee -a vitest-sequential.log
          echo "sequential_exit=${sequential_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## PR-suite diagnostic"
            echo "- Reference: \`${{ github.event.pull_request.head.sha }}\`"
            echo "- Node/npm/Vitest:"; cat versions.log 2>/dev/null || true
            echo "- npm ci exit: \`${{ steps.install.outputs.npm_ci_exit || 'not_run' }}\`"
            echo "- File collection exit: \`${{ steps.collect.outputs.list_exit || 'not_run' }}\`"
            echo "- Suite exit: \`${{ steps.suite.outputs.suite_exit || 'not_run' }}\`"
            echo "- Manifest exit: \`${{ steps.manifest.outputs.manifest_exit || 'not_run' }}\`"
            echo "- Sequential exit: \`${{ steps.sequential.outputs.sequential_exit || 'not_run' }}\`"
            echo "- Last recorded lines:"; tail -n 10 vitest-suite.log vitest-sequential.log 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"

