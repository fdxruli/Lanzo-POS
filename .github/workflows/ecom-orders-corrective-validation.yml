name: ECOM Orders Corrective Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compare-global-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fase-ecom-orders-1
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install branch dependencies
        run: npm ci

      - name: Run branch global commands
        shell: bash
        run: |
          set +e
          npm run lint > /tmp/branch-lint.log 2>&1
          echo $? > /tmp/branch-lint.exit
          npm run test:ci > /tmp/branch-test.log 2>&1
          echo $? > /tmp/branch-test.exit
          set -e

      - name: Run main global commands
        shell: bash
        run: |
          git worktree add /tmp/lanzo-main origin/main
          cd /tmp/lanzo-main
          npm ci
          set +e
          npm run lint > /tmp/main-lint.log 2>&1
          echo $? > /tmp/main-lint.exit
          npm run test:ci > /tmp/main-test.log 2>&1
          echo $? > /tmp/main-test.exit
          set -e

      - name: Commit concise temporary comparison
        shell: bash
        run: |
          mkdir -p tmp
          {
            echo "branch_lint_exit=$(cat /tmp/branch-lint.exit)"
            echo "main_lint_exit=$(cat /tmp/main-lint.exit)"
            echo "branch_test_exit=$(cat /tmp/branch-test.exit)"
            echo "main_test_exit=$(cat /tmp/main-test.exit)"
            echo
            echo '[branch_lint_summary]'
            grep -E '([0-9]+ problems|✖)' /tmp/branch-lint.log | tail -n 2 || true
            echo '[main_lint_summary]'
            grep -E '([0-9]+ problems|✖)' /tmp/main-lint.log | tail -n 2 || true
            echo '[branch_test_summary]'
            grep -E 'Test Files|Tests ' /tmp/branch-test.log | tail -n 4 || true
            echo '[main_test_summary]'
            grep -E 'Test Files|Tests ' /tmp/main-test.log | tail -n 4 || true
          } > tmp/ecom-orders-global-baseline.txt

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tmp/ecom-orders-global-baseline.txt
          git commit -m 'chore(ecommerce): record temporary global comparison [skip ci]'
          git push origin HEAD:fase-ecom-orders-1
