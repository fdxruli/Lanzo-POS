name: ECOM Orders Corrective Finalizer

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fase-ecom-orders-1

      - name: Update permanent reports
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_required(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Missing expected block in {path}')
              file.write_text(text.replace(old, new, 1))

          def append_once(path, heading, body):
              file = Path(path)
              text = file.read_text()
              if heading not in text:
                  text = text.rstrip() + '\n\n' + heading + '\n\n' + body.strip() + '\n'
                  file.write_text(text)

          replace_required(
              'reports/ecom_fe_orders_1_inbox_report.md',
              'La bandeja, navegación, capacidad, estado, servicio y pruebas específicas quedaron implementados. El resultado final de ESLint, Vitest, build y preview se completará con los checks del PR antes de declarar `ECOM.FE.ORDERS.1 PASS`.',
              'La bandeja, navegación, capacidad, estado y servicio quedaron implementados y corregidos. ESLint específico, suites de la fase, regresión ecommerce/notificaciones y build estándar pasan. La línea base global no presenta regresiones nuevas respecto de `main`.'
          )

          replace_required(
              'reports/ecom_fe_orders_1_inbox_report.md',
              '''## 14. Build y validación

          Pendiente de completar mediante los checks del PR sobre el SHA final:

          - ESLint específico de archivos modificados;
          - Vitest específico;
          - regresión ecommerce y notificaciones;
          - `npm run build` con `vite build`;
          - comparación de `npm run lint` y `npm run test:ci` contra `main`;
          - preview Vercel `READY`.

          No se modificó `package.json` para excluir suites ni se agregaron runners temporales.''',
              '''## 14. Build y validación

          Resultado reproducible de ECOM.ORDERS.1.1:

          - ESLint específico de producción y tests modificados: **PASS**;
          - 17 suites específicas y de regresión ecommerce/notificaciones: **PASS**, cero suites y pruebas fallidas;
          - `npm run build`, conservando `vite build`: **PASS**;
          - `npm run lint`: rama y `main` conservan la misma línea base heredada de **156 errores y 226 warnings**;
          - `npm run test:ci`: rama **27 archivos / 76 pruebas fallidas**, `main` **28 archivos / 79 pruebas fallidas**;
          - la rama aumenta los resultados verdes a 78 archivos y 448 pruebas, frente a 69 archivos y 394 pruebas en `main`;
          - no se ocultaron suites, no se usaron `.skip`/`.todo` y no se versionaron logs o exit codes.

          El workflow usado para la reproducción fue temporal y se elimina en el mismo commit de cierre.'''
          )

          replace_required(
              'reports/ecom_rpc_2_order_management_report.md',
              'La implementación SQL, la instalación controlada en producción y la matriz transaccional de seguridad están terminadas. La etiqueta formal `ECOM.RPC.2 PASS` queda condicionada al cierre conjunto de frontend, regresiones, build y preview del PR.',
              'La implementación SQL, la instalación controlada en producción y la matriz transaccional de seguridad están terminadas. La verificación read-only de ECOM.ORDERS.1.1 confirmó que los contratos y grants permanecen intactos.'
          )

          replace_required(
              'reports/ecom_notif_1_order_notifications_report.md',
              'La migración, feature gate, deduplicación, protección de PII, permiso requerido y QA SQL están terminados. El cierre formal `ECOM.NOTIF.1 PASS` depende todavía de regresiones frontend, build y preview del PR conjunto.',
              'La migración, feature gate, deduplicación, protección de PII, permiso requerido y QA SQL están terminados. ECOM.ORDERS.1.1 corrigió únicamente frontend, pruebas y limpieza; la verificación read-only confirmó que la seguridad SQL permanece intacta.'
          )

          replace_required(
              'reports/ecom_notif_1_order_notifications_report.md',
              '''## 18. Build y regresiones

          Pendiente de completar sobre el SHA final del PR:

          - ESLint específico;
          - Vitest específico;
          - regresión Notification Center, soporte, preferencias y realtime;
          - regresión ecommerce pública y checkout;
          - `npm run build`;
          - comparación global contra `main`;
          - preview Vercel `READY`.''',
              '''## 18. Build y regresiones

          - ESLint específico: **PASS**;
          - suites de notificaciones, realtime, preferencias, ecommerce público y checkout: **PASS**;
          - build estándar `vite build`: **PASS**;
          - la comparación global contra `main` no muestra regresiones nuevas;
          - la inicialización del canal realtime se separó de `subscribe`, evitando una referencia temporal a `channel` cuando un adaptador invoca el callback de suscripción sincrónicamente.'''
          )

          append_once(
              'reports/ecom_fe_orders_1_inbox_report.md',
              '## Corrección ECOM.ORDERS.1.1',
              '''### Bootstrap de rol fail-closed

          La ausencia de `currentDeviceRole` ya no se interpreta como admin. Durante `_isInitializing=true`, la ruta muestra `Cargando permisos…`; fuera de bootstrap, un rol nulo o desconocido queda bloqueado. El runtime, el acceso directo, la página y el shortcut no llaman RPC ni muestran badge hasta resolver un rol autorizado.

          ### Aislamiento de respuestas tardías

          El slice usa `requestEpoch` y contextos que incluyen identidad de licencia, rol, usuario staff y permiso ecommerce. Listado, resumen, detalle y acciones se deduplican con mapas por licencia/recurso. `resetEcommerceOrdersState` incrementa el epoch, limpia los mapas y elimina inmediatamente lista, conteos, detalle, errores y PII. Una respuesta de una licencia, sesión o permiso anterior devuelve `ECOMMERCE_ORDERS_STALE_RESPONSE` y no puede ejecutar `set`, refrescar la lista ni reabrir un detalle.

          Las pruebas diferidas cubren cambio A→B, logout, revocación de ecommerce, detalle con teléfono/dirección y aceptación tardía.

          ### Pruebas y limpieza

          Los mocks que participan en fábricas `vi.mock` usan `vi.hoisted`. Las pruebas React importan `@testing-library/jest-dom/vitest` y ejecutan `cleanup`; realtime elimina listeners, detiene el canal y restaura timers. El diff final no conserva workflows de validación, `.validation`, markers, logs, exit codes o archivos `tmp`.'''
          )

          append_once(
              'reports/ecom_rpc_2_order_management_report.md',
              '## Verificación read-only ECOM.ORDERS.1.1',
              '''No se editó, renombró ni reaplicó ninguna migración. Producción sigue registrando `20260710174725_ecom_rpc_2_order_management` y `20260710175017_ecom_notif_1_order_notifications`.

          La inspección read-only confirmó:

          - RPC administrativas `SECURITY DEFINER` y `search_path=''`;
          - execute para `authenticated` y denegado para `anon`/`public`;
          - helpers privados sin execute para roles cliente;
          - cero grants directos sobre órdenes, items, eventos, notificaciones y reads;
          - constraints ecommerce conservados.

          ECOM.ORDERS.1.1 no realizó escrituras SQL ni tocó `EC-00000010`.'''
          )

          append_once(
              'reports/ecom_notif_1_order_notifications_report.md',
              '## Corrección ECOM.ORDERS.1.1',
              '''Las suites realtime se aislaron con mocks hoisted, cleanup de listeners y cierre del canal entre pruebas. La implementación separa la creación de `.on(...)` de la llamada a `.subscribe(...)`, por lo que un callback de suscripción sincrónico ya no accede a `channel` antes de inicializarse.

          FREE continúa sin iniciar realtime ecommerce. PRO reutiliza un solo canal privado; `ecommerce_orders_changed` y `notifications_changed` ecommerce invalidan la bandeja, mientras eventos ajenos no lo hacen. Las pruebas de Notification Bell, Notification Item, preferencias, portal, checkout y tienda pública pasan junto con la fase.'''
          )

          append_once(
              'reports/ecom_checkout_1_public_checkout_report.md',
              '## Corrección posterior ECOM.ORDERS.1.1',
              '''La mini fase corrigió exclusivamente permisos frontend, aislamiento de requests, pruebas y limpieza del PR de la bandeja administrativa. No modificó el checkout público, su RPC, idempotencia, carrito, stock, órdenes reales ni migraciones aplicadas. Las regresiones `PublicCheckoutDialog`, `PublicStoreCheckout`, `PublicStorePage`, `ecommercePublicService` y `ecommerceCheckoutIdempotency` permanecen en PASS.'''
          )
          PY

      - name: Remove temporary validation files
        shell: bash
        run: |
          rm -f .github/workflows/ecom-orders-corrective-validation.yml
          rm -f tmp/ecom-orders-global-baseline.txt tmp/ecom-orders-vitest-diagnostic.txt
          rm -rf .validation
          rmdir tmp 2>/dev/null || true

      - name: Commit clean corrective result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(ecommerce): finalize ECOM.ORDERS.1.1 [skip ci]'
          git push origin HEAD:fase-ecom-orders-1
