name: ECOM Checkout Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fase-ecom-checkout-1
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checkout-specific:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ESLint checkout and public files
        run: >-
          npx eslint
          src/services/ecommerce/ecommercePublicService.js
          src/services/ecommerce/ecommerceCheckoutIdempotency.js
          src/components/ecommerce/public/PublicCartDrawer.jsx
          src/components/ecommerce/public/PublicCheckoutDialog.jsx
          src/components/ecommerce/public/PublicOrderConfirmation.jsx
          src/pages/PublicStorePage.jsx
          src/services/ecommerce/__tests__/ecommercePublicService.test.js
          src/services/ecommerce/__tests__/ecommerceCheckoutIdempotency.test.js
          src/components/ecommerce/public/__tests__/PublicCheckoutDialog.test.jsx
          src/pages/__tests__/PublicStoreCheckout.test.jsx
      - name: Vitest checkout and public regression
        run: >-
          npx vitest run
          src/services/ecommerce/__tests__/ecommercePublicService.test.js
          src/services/ecommerce/__tests__/ecommercePublicProductRules.test.js
          src/services/ecommerce/__tests__/ecommerceCheckoutIdempotency.test.js
          src/hooks/ecommerce/__tests__/usePublicCart.test.jsx
          src/components/ecommerce/public/__tests__/PublicCheckoutDialog.test.jsx
          src/pages/__tests__/PublicStorePage.test.jsx
          src/pages/__tests__/PublicStoreCheckout.test.jsx
          src/router/__tests__/publicStoreRouting.test.jsx
          --maxWorkers=4
      - name: Production build
        run: npm run build

  inherited-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Global lint baseline
        id: lint
        continue-on-error: true
        run: npm run lint
      - name: Global test baseline
        id: tests
        continue-on-error: true
        run: npm run test:ci
      - name: Record inherited outcomes
        run: |
          echo "GLOBAL_LINT_OUTCOME=${{ steps.lint.outcome }}"
          echo "GLOBAL_TEST_OUTCOME=${{ steps.tests.outcome }}"
