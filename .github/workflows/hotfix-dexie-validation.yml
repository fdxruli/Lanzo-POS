name: HOTFIX Dexie Recovery Validation

on:
  push:
    branches:
      - hotfix/dexie-primary-key-recovery-admin-bootstrap
  pull_request:
    branches:
      - main
    paths:
      - 'src/services/db/**'
      - 'src/services/sync/**'
      - 'src/services/storageManager.js'
      - 'src/components/common/AdminLoginModal.jsx'
      - 'src/components/common/DatabaseRecoveryGate.jsx'
      - 'src/store/**'
      - 'src/workers/migration.worker.js'
      - 'src/main.jsx'
      - '.github/workflows/hotfix-dexie-validation.yml'

permissions:
  contents: read

jobs:
  focal-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dexie recovery tests
        run: npm run test:ci -- src/services/db/__tests__/indexedDbPrimaryKeyRecovery.test.js

      - name: Admin login tests
        run: npm run test:ci -- src/components/common/__tests__/AdminLoginModal.recovery.test.jsx src/store/slices/license/__tests__/licenseAdminActions.localRecovery.test.js

      - name: StorageManager tests
        run: npm run test:ci -- src/services/__tests__/storageManager.bestEffort.test.js

      - name: Focal ESLint
        run: >-
          npx eslint
          src/services/db/databaseRecoveryState.js
          src/services/db/databaseRuntime.js
          src/services/db/databaseSchema.js
          src/services/db/indexedDbPreflight.js
          src/services/storageManager.js
          src/services/sync/syncDexieBootstrap.js
          src/services/sync/syncMetaService.js
          src/components/common/AdminLoginModal.jsx
          src/components/common/DatabaseRecoveryGate.jsx
          src/store/productStoreRecoveryGuard.js
          src/store/slices/license/licenseAdminActions.js
          src/store/slices/license/licenseBootstrapActions.js
          src/workers/migration.worker.js
          src/main.jsx

      - name: Diff check
        run: git diff --check origin/main...HEAD

      - name: Production build
        run: npm run build
